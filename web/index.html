<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Office — ภาพรวมทีม AI</title>
<style>
  :root{
    --bg:#0b1020; --card:#141b30; --line:#243049; --text:#e8edf7; --muted:#9aa7c2;
    --brand:#6366f1; --brand2:#22d3ee;
    --work:#22c55e; --wait:#f59e0b; --idle:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}

  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:26px 0 18px;border-bottom:1px solid var(--line)}
  .title{font-weight:800;font-size:1.35rem}
  .title span{background:linear-gradient(90deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .meta{color:var(--muted);font-size:.9rem;display:flex;align-items:center;gap:10px}
  .live{display:inline-flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--work);box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

  /* stat bar */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .stat b{font-size:1.7rem;display:block}
  .stat small{color:var(--muted)}

  .layout{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start;padding-bottom:40px}
  @media(max-width:820px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}

  h2{font-size:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:6px 0 12px}

  .board{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .agent{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;transition:.2s}
  .agent:hover{border-color:var(--brand)}
  .agent .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .agent .ico{font-size:1.6rem}
  .agent .nm{font-weight:700}
  .agent .rl{color:var(--muted);font-size:.8rem}
  .pill{margin-left:auto;font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:999px}
  .pill.working{background:rgba(34,197,94,.15);color:var(--work)}
  .pill.waiting{background:rgba(245,158,11,.15);color:var(--wait)}
  .pill.idle{background:rgba(100,116,139,.18);color:var(--idle)}
  .label{font-size:.72rem;color:var(--muted);margin-top:10px}
  .task{font-size:.95rem;font-weight:600}
  .think{font-size:.88rem;color:var(--muted);font-style:italic;background:#0c1224;border-left:3px solid var(--brand);padding:8px 10px;border-radius:0 8px 8px 0;margin-top:6px}
  .bar{height:6px;background:#0c1224;border-radius:999px;margin-top:12px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:999px;transition:width .4s}

  .feed{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
  .feed ul{list-style:none}
  .feed li{padding:10px 0;border-bottom:1px solid var(--line);font-size:.88rem}
  .feed li:last-child{border:none}
  .feed .t{color:var(--brand2);font-variant-numeric:tabular-nums;margin-right:8px}
  .feed .w{color:var(--text);font-weight:600}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="title">🖥️ Home <span>Office</span></div>
      <div class="meta" id="proj">ภาพรวมทีม AI</div>
    </div>
    <div class="meta live"><span class="dot"></span> อัปเดตอัตโนมัติทุก 3 วิ · <span id="clock"></span></div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="layout">
    <div>
      <h2>ทีมงาน — ใครทำอะไรอยู่</h2>
      <div class="board" id="board"></div>
    </div>
    <div>
      <h2>ฟีดกิจกรรม</h2>
      <div class="feed"><ul id="feed"></ul></div>
    </div>
  </div>

</div>

<script>
  const STATUS_TH = { working:"กำลังทำ", waiting:"รออยู่", idle:"ว่าง" };

  async function load(){
    try{
      const s = await (await fetch('/api/state')).json();
      document.getElementById('proj').textContent = '📁 ' + s.project;

      // stats
      const c = {working:0, waiting:0, idle:0};
      s.agents.forEach(a => c[a.status]++);
      document.getElementById('stats').innerHTML = `
        <div class="stat"><b>${s.agents.length}</b><small>สมาชิกทีม</small></div>
        <div class="stat"><b style="color:var(--work)">${c.working}</b><small>กำลังทำงาน</small></div>
        <div class="stat"><b style="color:var(--wait)">${c.waiting}</b><small>รออยู่</small></div>
        <div class="stat"><b style="color:var(--idle)">${c.idle}</b><small>ว่าง</small></div>`;

      // agents
      document.getElementById('board').innerHTML = s.agents.map(a => `
        <div class="agent">
          <div class="top">
            <span class="ico">${a.icon}</span>
            <div><div class="nm">${a.name}</div><div class="rl">${a.role}</div></div>
            <span class="pill ${a.status}">${STATUS_TH[a.status]}</span>
          </div>
          <div class="label">งานปัจจุบัน</div>
          <div class="task">${a.task}</div>
          <div class="label">กำลังคิด 💭</div>
          <div class="think">${a.thought}</div>
          <div class="bar"><i style="width:${a.progress}%"></i></div>
        </div>`).join('');

      // feed
      document.getElementById('feed').innerHTML = s.activity.map(e =>
        `<li><span class="t">${e.time}</span><span class="w">${e.who}</span> ${e.text}</li>`).join('');
    }catch(e){ console.error(e); }
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('th-TH');
  }

  load();
  setInterval(load, 3000);
</script>
</body>
</html>
